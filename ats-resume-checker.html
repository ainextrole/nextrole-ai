<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free ATS Resume Checker Tool (Instant Score) | NextRole AI</title>

<meta name="description" content="Check your resume ATS score instantly for free. Improve your resume with AI-based suggestions for better job selection chances.">
<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  max-width:900px;
  margin:auto;
  padding:40px;
  line-height:1.7;
}

h1,h2{
  color:#60a5fa;
}

textarea{
  width:100%;
  height:200px;
  padding:15px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button{
  background:#3b82f6;
  color:white;
  border:none;
  padding:12px 20px;
  margin-top:15px;
  border-radius:8px;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>Free ATS Resume Checker</h1>
  <p>
Free ATS Resume Checker tool designed for students and freshers to improve resume ranking and job selection chances.
</p>

<p>
Paste your resume below and get an instant ATS score with improvement suggestions.

</p>

<textarea id="resume" placeholder="Paste your resume here..."></textarea>

<br>

<button onclick="checkATS()">Check Score</button>

<div class="card" id="result" style="display:none;"></div>

<script>
function checkATS(){
    let text = document.getElementById("resume").value;

    if(text.length < 50){
        alert("Please paste a proper resume");
        return;
    }

    let score = Math.floor(Math.random() * 30) + 60;

    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerHTML =
        "<h2>Your ATS Score: " + score + "/100</h2>" +
        "<p>Improve your resume by adding keywords, skills, and achievements.</p>";
}
</script>

</body>
</html>
